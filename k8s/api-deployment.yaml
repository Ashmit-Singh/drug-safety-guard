apiVersion: apps/v1
kind: Deployment
metadata:
  name: drug-interaction-api
  namespace: drug-interaction
  labels:
    app: drug-interaction-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: drug-interaction-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: drug-interaction-api
        version: v1
    spec:
      containers:
        - name: api
          image: drug-interaction-api:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: drug-interaction-secrets
                  key: supabase-url
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: drug-interaction-secrets
                  key: supabase-anon-key
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: drug-interaction-secrets
                  key: supabase-service-role-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: drug-interaction-secrets
                  key: jwt-secret
            - name: REDIS_HOST
              value: redis-service
            - name: REDIS_PORT
              value: '6379'
            - name: CASSANDRA_CONTACT_POINTS
              value: cassandra-service
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: drug-interaction-api-service
  namespace: drug-interaction
spec:
  type: ClusterIP
  selector:
    app: drug-interaction-api
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drug-interaction-api-hpa
  namespace: drug-interaction
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drug-interaction-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
