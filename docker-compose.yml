version: '3.8'

services:
  # ── Node.js API Server ───────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drug-interaction-api
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_PORT=9042
    depends_on:
      redis:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drug-net
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Redis Cache ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: drug-interaction-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - drug-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Apache Cassandra ─────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: drug-interaction-cassandra
    ports:
      - '9042:9042'
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./database/cassandra:/docker-entrypoint-initdb.d
    environment:
      - CASSANDRA_CLUSTER_NAME=DrugInteractionCluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    restart: unless-stopped
    networks:
      - drug-net
    healthcheck:
      test: ['CMD-SHELL', 'cqlsh -e "DESCRIBE KEYSPACES"']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

volumes:
  redis_data:
    driver: local
  cassandra_data:
    driver: local

networks:
  drug-net:
    driver: bridge
